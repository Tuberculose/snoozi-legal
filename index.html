<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snoozi - Documents publics</title>
  <style>
    :root {
      --bg: #fff4f8;
      --card: #ffffff;
      --text: #2f1f3b;
      --muted: #6b5a77;
      --accent: #ff5da2;
      --border: #f1c7d8;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ffe6f0 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(47, 31, 59, 0.06);
    }
    h1 {
      margin-top: 0;
      color: var(--accent);
      font-size: 32px;
    }
    p, li {
      line-height: 1.6;
    }
    .muted {
      color: var(--muted);
    }
    a {
      color: #b3326b;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Snoozi</h1>
      <p class="muted">Documents publics</p>
      <ul>
        <li><a href="privacy/">Politique de confidentialite</a></li>
        <li><a href="delete-account/">Suppression de compte</a></li>
        <li><a href="data-delete/">Suppression de donnees</a></li>
      </ul>
      <p>Support: <a href="mailto:petales.help@outlook.com">petales.help@outlook.com</a></p>
    </div>
  </main>
</body>
</html>
